name: Deploy to MonsterASP.net

on: push

jobs:
  deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Restore dependencies
        run: dotnet restore src/HotelManager.API/HotelManager.API.csproj -r win-x86

      - name: Build
        run: dotnet build src/HotelManager.API/HotelManager.API.csproj -c Release --no-restore

      - name: Publish API
        run: dotnet publish src/HotelManager.API/HotelManager.API.csproj -c Release -r win-x86 --no-self-contained -o ./publish --no-build

      - name: Deploy to MonsterASP.net via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
